name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Go fmt
        run: gofmt -w $(find . -name '*.go' -not -path './vendor/*')
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./...
      - name: Build
        run: go build ./...
