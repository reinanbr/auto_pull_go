name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o dist/autopull_linux_amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/autopull_darwin_arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/autopull_darwin_amd64 .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o dist/autopull_linux_amd64  .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/autopull_darwin_arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/autopull_darwin_amd64 .
          cd dist && sha256sum * > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/autopull_linux_amd64
            dist/autopull_darwin_arm64
            dist/autopull_darwin_amd64
            dist/sha256sums.txt
          generate_release_notes: true